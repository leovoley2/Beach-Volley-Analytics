[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# SPA redirect — todas las rutas van a index.html excepto las funciones
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
